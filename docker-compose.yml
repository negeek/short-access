# Development stack: builds the image from source. For running the published
# image instead, see docker-compose.sample.yml.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Runs migrations once and exits. The app waits for it to finish.
  migrate:
    build: .
    command: ["migrate", "up"]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Throwaway database for running the test suite. It is behind the "test"
  # profile so a plain `docker compose up` never starts it. Bring it up with:
  #   docker compose --profile test up -d test-db
  # then point the tests at it:
  #   export TEST_DATABASE_URL=postgres://sauser:sapass@localhost:5444/sadb_test?sslmode=disable
  test-db:
    image: postgres:17-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: sauser
      POSTGRES_PASSWORD: sapass
      POSTGRES_DB: sadb_test
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sauser -d sadb_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
